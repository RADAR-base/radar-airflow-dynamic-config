model_name: sample_anomaly_detection  # No model needed
model_description: Sample config to demonstrate heart rate spikes detection
data:
  project: STAGING_PROJECT
  source_type: kafka
  source_config:
    conn_id: kafka_staging
    topics:
      - wearable_heart_rate
tasks:
  - task_name: anomaly_detection
    type: custom_task
    enabled: true
    schedule: "* 5 * * *"
    path: /sample_anomaly_detection/STAGING_PROJECT/spike_detection.py
    params:
      threshold: 200  # Heart rate threshold for spike detection
    actions:
      - type: "send_notification"
        output_rule:
          - "anomaly_detection.participants_id.is_anomaly == true"
        config: []
      - type: "alert"
        config:
          method: "email"
      - type: "alert"
        config:
          method: "api_request"
